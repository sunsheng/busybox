name: Build & release ARM musl static busybox

# Cross-compiles a fully static 32-bit ARM (armhf, hard-float) BusyBox with a
# musl cross toolchain from cross-tools/musl-cross, verifies it with `file` /
# `readelf` and qemu-arm, then publishes the binary as a GitHub Release.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/release-arm-musl.yml'
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-arm-musl
  cancel-in-progress: true

env:
  TOOLCHAIN_URL: https://github.com/cross-tools/musl-cross/releases/download/20260515/arm-unknown-linux-musleabihf.tar.xz
  CROSS: arm-unknown-linux-musleabihf-
  TAG: busybox-arm-musl-static

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qemu-user-static (for functional verification)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Fetch musl cross toolchain
        run: |
          set -eu
          mkdir -p "$HOME/tc"
          wget -q "$TOOLCHAIN_URL" -O /tmp/tc.tar.xz
          tar xf /tmp/tc.tar.xz -C "$HOME/tc"
          bin_dir="$(dirname "$(find "$HOME/tc" -type f -name "${CROSS}gcc" | head -1)")"
          echo "$bin_dir" >> "$GITHUB_PATH"

      - name: Configure (static + cross + disable x86-only SHA HWACCEL)
        run: |
          set -eu
          make defconfig
          # Static linking against musl:
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          sed -i "s#CONFIG_CROSS_COMPILER_PREFIX=\"\"#CONFIG_CROSS_COMPILER_PREFIX=\"${CROSS}\"#" .config
          # Disable x86-only SHA-NI hardware acceleration; it fails to build on
          # ARM (sha1_process_block64_shaNI is an Intel SHA-extension code path).
          sed -i 's/CONFIG_SHA1_HWACCEL=y/# CONFIG_SHA1_HWACCEL is not set/' .config
          sed -i 's/CONFIG_SHA256_HWACCEL=y/# CONFIG_SHA256_HWACCEL is not set/' .config
          yes "" | make oldconfig CROSS_COMPILE="${CROSS}"

      - name: Build
        run: make -j"$(nproc)" CROSS_COMPILE="${CROSS}"

      - name: Verify it is a static ARM binary (file + readelf)
        run: |
          set -eu
          file busybox
          if "${CROSS}readelf" -d busybox | grep -q NEEDED; then
            echo "ERROR: binary has shared-library dependencies (not static)"; exit 1
          fi
          if "${CROSS}readelf" -l busybox | grep -q INTERP; then
            echo "ERROR: binary requests a dynamic loader (not static)"; exit 1
          fi
          echo "OK: no NEEDED entries and no INTERP segment -> fully static"

      - name: Verify functionality with qemu-arm
        run: |
          set -eu
          Q=qemu-arm-static
          $Q ./busybox | head -1
          $Q ./busybox echo "hello from static ARM busybox"
          echo "test data" | $Q ./busybox sha256sum
          echo "test data" | $Q ./busybox sha1sum
          echo "test data" | $Q ./busybox md5sum
          $Q ./busybox awk 'BEGIN { print "awk: 6*7 = " (6 * 7) }'
          printf 'b\na\nb\nc\n' | $Q ./busybox sort | $Q ./busybox uniq -c || true
          echo "applets: $($Q ./busybox --list | wc -l)"

      - name: Package artifacts
        run: |
          set -eu
          mkdir -p dist
          cp busybox dist/busybox-armhf-musl-static
          cp .config dist/busybox.config
          ( cd dist && sha256sum busybox-armhf-musl-static > SHA256SUMS )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: busybox-armhf-musl-static
          path: dist/

      - name: Create / update GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Static ARM (armhf/musl) BusyBox
          body: |
            Fully static **32-bit ARM (armhf, hard-float)** BusyBox, cross-compiled
            in CI with a musl toolchain from
            [cross-tools/musl-cross](https://github.com/cross-tools/musl-cross).

            - **Linking:** `CONFIG_STATIC=y` — no shared libraries, no dynamic loader
            - **Disabled feature:** x86-only SHA hardware acceleration
              (`CONFIG_SHA1_HWACCEL` / `CONFIG_SHA256_HWACCEL`), which does not
              compile for ARM. `sha1sum`/`sha256sum` still work via the portable C code.

            ## Assets
            - `busybox-armhf-musl-static` — the static ARM binary
            - `busybox.config` — exact build configuration
            - `SHA256SUMS` — checksum
          files: |
            dist/busybox-armhf-musl-static
            dist/busybox.config
            dist/SHA256SUMS
          target_commitish: ${{ github.sha }}
