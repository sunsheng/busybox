name: Build ARM musl static busybox (muslcc Docker Hub image)

# Cross-compiles a fully static 32-bit ARM (armhf, hard-float) BusyBox using the
# official muslcc toolchain distributed as a Docker Hub image
# (docker.io/muslcc/x86_64:arm-linux-musleabihf), which ships the
# arm-linux-musleabihf- musl cross toolchain preinstalled and on PATH.
#
# The muslcc image is Alpine/musl-based, so it can't be used as a GitHub Actions
# `container:` (the glibc node that Actions injects to run checkout/upload-artifact
# won't execute under musl). Instead we check out on the host runner and invoke
# the toolchain via `docker run`, then verify the binary on the host: host binutils
# read ARM ELF fine, and qemu-arm-static runs it.
on: [push]

# A newer run supersedes an in-progress one.
concurrency:
  group: build-arm-muslcc-docker
  cancel-in-progress: true

env:
  IMAGE: muslcc/x86_64:arm-linux-musleabihf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static ARM busybox inside the muslcc image
        run: |
          set -eu
          docker run --rm -v "$PWD:/src" -w /src "$IMAGE" sh -euxc '
            # Alpine image: install make/perl/tar for the build, plus a *native*
            # gcc (HOSTCC) — busybox first compiles host tools like fixdep, which
            # must run on the x86_64 build host, not the ARM target.
            apk add --no-cache make bash perl tar bzip2 gcc musl-dev
            # The musl cross toolchain ships in the image but its bin dir is not
            # on PATH; auto-detect it and derive the CROSS_COMPILE prefix.
            cross_gcc=$(find / -type f -name "*-linux-musleabihf-gcc" 2>/dev/null | head -1)
            [ -n "$cross_gcc" ] || { echo "ERROR: cross gcc not found in image"; exit 1; }
            bindir=$(dirname "$cross_gcc")
            cross=$(basename "$cross_gcc" | sed "s/gcc$//")
            export PATH="$bindir:$PATH"
            echo "cross prefix: $cross ; bin dir: $bindir"
            "${cross}gcc" --version | head -1
            make defconfig
            # Static linking against musl:
            sed -i "s/# CONFIG_STATIC is not set/CONFIG_STATIC=y/" .config
            sed -i "s#CONFIG_CROSS_COMPILER_PREFIX=\"\"#CONFIG_CROSS_COMPILER_PREFIX=\"${cross}\"#" .config
            # Disable x86-only SHA-NI hardware acceleration; it does not build for ARM.
            sed -i "s/CONFIG_SHA1_HWACCEL=y/# CONFIG_SHA1_HWACCEL is not set/" .config
            sed -i "s/CONFIG_SHA256_HWACCEL=y/# CONFIG_SHA256_HWACCEL is not set/" .config
            yes "" | make oldconfig CROSS_COMPILE="${cross}"
            make -j"$(nproc)" CROSS_COMPILE="${cross}"
          '

      - name: Verify it is a static ARM binary (file + readelf)
        run: |
          set -eu
          # Host binutils/file read ARM ELF just fine (they are not target-specific
          # for these queries).
          file busybox
          if readelf -d busybox | grep -q NEEDED; then
            echo "ERROR: binary has shared-library dependencies (not static)"; exit 1
          fi
          if readelf -l busybox | grep -q INTERP; then
            echo "ERROR: binary requests a dynamic loader (not static)"; exit 1
          fi
          echo "OK: no NEEDED entries and no INTERP segment -> fully static"

      - name: Verify functionality with qemu-arm
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          Q=qemu-arm-static
          $Q ./busybox | head -1
          $Q ./busybox echo "hello from static ARM busybox (muslcc image)"
          echo "test data" | $Q ./busybox sha256sum
          $Q ./busybox awk 'BEGIN { print "awk: 6*7 = " (6 * 7) }'
          echo "applets: $($Q ./busybox --list | wc -l)"

      - name: Package artifacts
        run: |
          set -eu
          mkdir -p dist
          cp busybox dist/busybox-armhf-musl-static
          cp .config dist/busybox.config
          ( cd dist && sha256sum busybox-armhf-musl-static > SHA256SUMS )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-armhf-musl-static-muslcc
          path: dist/
          if-no-files-found: error
